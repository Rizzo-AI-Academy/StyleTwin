# Force `npm install` instead of `npm ci` to work around the npm bug with
# Rollup's platform-specific optional deps (lockfile generated on Windows
# misses @rollup/rollup-linux-x64-gnu). See https://github.com/npm/cli/issues/4828

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x", "caddy"]

[phases.install]
cmds = ["npm install --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "caddy run --config /app/Caddyfile --adapter caddyfile"
