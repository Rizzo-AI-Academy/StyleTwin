# Force Nixpacks to use `npm install` instead of `npm ci`.
# `npm ci` is strict about the lockfile and rejects platform-specific optional
# deps that aren't listed (e.g. @rollup/rollup-linux-x64-gnu when the lockfile
# was generated on Windows). `npm install` resolves the right binary at runtime.
# See https://github.com/npm/cli/issues/4828

[phases.install]
cmds = ["npm install --no-audit --no-fund"]
